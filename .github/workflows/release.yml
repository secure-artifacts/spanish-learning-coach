name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Package Windows app
        run: npm run pack:win

      - name: Zip packaged app
        shell: pwsh
        run: |
          $folder = Get-ChildItem release -Directory | Select-Object -First 1
          Compress-Archive -Path $folder.FullName -DestinationPath "SpanishLearningCoach-${{ github.ref_name }}-win64.zip" -Force

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: '*.zip'

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.zip'
          generate_release_notes: true
